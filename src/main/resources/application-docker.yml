server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${OW_DB_HOST:mysql}:${OW_DB_PORT:3306}/${OW_DB_NAME:official_website}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${OW_DB_USERNAME:official_website}
    password: ${OW_DB_PASSWORD:official_website_local}
  data:
    redis:
      host: ${OW_REDIS_HOST:redis}
      port: ${OW_REDIS_PORT:6379}
      password: ${OW_REDIS_PASSWORD:}
      database: ${OW_REDIS_DATABASE:0}

official:
  cors:
    admin:
      allowed-origins:
        - http://localhost:5173
    portal:
      allowed-origins:
        - http://localhost:5173
  storage:
    local-root-dir: ${OW_MEDIA_ROOT_DIR:/var/lib/official-website/media}
    public-url-prefix: ${OW_MEDIA_PUBLIC_URL_PREFIX:/media/public/}
    max-image-size-bytes: ${OW_MAX_IMAGE_SIZE_BYTES:2097152}
