server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax

spring:
  application:
    name: official-website
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      timeout: 3s

official:
  cache:
    key-prefix: official
    default-ttl: 10m
    second-delete-delay: 1s
    sort-gap: 10
  cors:
    admin:
      allowed-origins: []
      allowed-origin-patterns: []
      max-age: 1h
    portal:
      allowed-origins: []
      allowed-origin-patterns: []
      max-age: 1h
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 200
    keep-alive: 60s
    await-termination: 30s
    thread-name-prefix: official-async-
  scheduler:
    pool-size: 2
    await-termination: 30s
    thread-name-prefix: official-scheduler-

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto
