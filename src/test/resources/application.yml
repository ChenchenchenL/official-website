server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax

spring:
  datasource:
    url: jdbc:h2:mem:official_website;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 3s

official:
  storage:
    local-root-dir: /tmp/official-website-test/media
    public-url-prefix: /media/public/
    max-image-size-bytes: 2097152
  cache:
    key-prefix: official
    default-ttl: 10m
    second-delete-delay: 1s
  cors:
    admin:
      allowed-origins:
        - https://admin.test.example.com
      allowed-origin-patterns: []
      max-age: 30m
    portal:
      allowed-origins: []
      allowed-origin-patterns:
        - https://*.test.example.com
      max-age: 15m
  async:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 200
    keep-alive: 60s
    await-termination: 30s
    thread-name-prefix: official-async-
  scheduler:
    pool-size: 1
    await-termination: 15s
    thread-name-prefix: test-official-scheduler-

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto
